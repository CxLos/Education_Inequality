
name: CI/CD

on:
 push:
   branches: [ main ]
 pull_request:
   branches: [ main ]

jobs:
 test:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-python@v5
       with:
         python-version: '3.11'
     - uses: actions/cache@v4
       with:
         path: |
           venv
           ~/.cache/pip
         key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
         restore-keys: |
           ${{ runner.os }}-pip-
     - name: Install dependencies
       run: |
         python -m venv venv
         source venv/bin/activate
         pip install -r requirements.txt

     - name: Run tests
       run: |
         source venv/bin/activate
         pytest


 security:
   needs: test
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4

     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3

     - name: Build image (with layer cache)
       uses: docker/build-push-action@v7
       with:
         context: .
         load: true
         tags: app:test
         cache-from: type=gha
         cache-to: type=gha,mode=max

     - name: Run Trivy vulnerability scanner
       uses: aquasecurity/trivy-action@v0.36.0
       with:
         image-ref: 'app:test'
         format: 'table'
         exit-code: '1'
         trivyignores: .trivyignore
         ignore-unfixed: true
         severity: 'CRITICAL,HIGH'
         skip-files: 'usr/local/lib/python3.11/site-packages'

 deploy:
   needs: security
   if: github.ref == 'refs/heads/main'
   runs-on: ubuntu-latest
   environment: production
   steps:
     - uses: actions/checkout@v4
     - uses: docker/setup-buildx-action@v3
     - uses: docker/login-action@v3
       with:
         username: ${{ secrets.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}
     - uses: docker/build-push-action@v5
       with:
         push: true
         tags: |
           cxlos/education_inequality:latest
           cxlos/education_inequality:${{ github.sha }}
         platforms: linux/amd64,linux/arm64
         cache-from: type=registry,ref=cxlos/education_inequality:cache
         cache-to: type=inline